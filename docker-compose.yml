version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: construction-api
    restart: always
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "5000:5000"

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: construction-web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:5000/api}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: construction-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
